spring.application.name=login

spring.messages.basename=messages
spring.messages.encoding=UTF-8

JWT_SECRET=${JWT_SECRET}
spring.profiles.active=dev

# Security configuration
# Access token expiration in milliseconds (default: 15 minutes = 900000)
app.security.access-token-expiration-ms=900000

# Refresh token validity in days (default: 7 days)
app.security.refresh-token-validity-days=7

# Secure cookies (set to true in production with HTTPS)
app.security.secure-cookies=false

# CORS allowed origins (comma-separated)
app.cors.allowed-origins=http://localhost:3000,http://localhost:4200
