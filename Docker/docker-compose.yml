name: studer
services:
  db:
    container_name: studer_db
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - backend_net
  app-be:
    container_name: studer_app_be
    build: ../Backend/STUDER/
    depends_on:
      - db
    environment:
      SPRING_PROFILES_ACTIVE: prod
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8081:8081"
    restart: always
    networks:
      - backend_net
  frontend:
    container_name: studer_frontend
    build: ../Frontend/STUDER/
    ports:
      - "4200:80"
    restart: always
    networks:
      - frontend_net
  nginx:
    container_name: studer_nginx
    image: nginx:alpine
    depends_on:
      - frontend
      - app-be
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "1583:1583"
    restart: always
    networks:
      - frontend_net
      - backend_net
volumes:
  db_data:
networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
